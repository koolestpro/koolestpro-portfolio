<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 160 220" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="KURA K-mark icon">
  <!--
    KURA K-MARK ICON  ·  v1.0  ·  2026
    Brand colors:
      Deep Slate   #2B3445  (primary fill)
      Burnished Copper  #C47A3A  (accent rule)
      Warm Cream   #F6EFE2  (reversed version — swap fill to this color)

    USAGE:
    - On light / cream backgrounds  → fill="#2B3445"
    - On dark / slate backgrounds   → fill="#F6EFE2"  (swap the fill values below)
    - Minimum size: 24px wide
    - Clear space: equal to half the icon width on all sides
  -->

  <!-- VERTICAL STEM -->
  <rect x="20" y="20" width="22" height="162" fill="#2B3445"/>

  <!-- UPPER DIAGONAL ARM  (stem junction y 74–101 → upper-right tip) -->
  <polygon points="42,74 42,101 142,40 142,20" fill="#2B3445"/>

  <!-- LOWER DIAGONAL ARM  (mirror, stem junction y 101–128 → lower-right tip) -->
  <polygon points="42,101 42,128 142,182 142,162" fill="#2B3445"/>

  <!-- BURNISHED COPPER ACCENT RULE -->
  <rect x="20" y="196" width="122" height="5" fill="#C47A3A"/>
</svg>
